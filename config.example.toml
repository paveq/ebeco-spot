# ebeco-spot configuration.
#
# Credentials are NOT stored here — set them in the environment instead:
#   EBECO_EMAIL=you@example.com
#   EBECO_PASSWORD=secret
#
# Copy this file to config.toml and edit it. The only required field is
# device_ids; every other field below shows its default value.

# Ebeco device ids to control.
# Find them in the startup logs (every device's id and name is logged on launch)
# or by running `ebeco-spot -list`.
device_ids = [12345]

# === spot-hinta.fi PlanAhead parameters (mirror of the Shelly script) ===

# Price region.
# One of: DK1, DK2, EE, FI, LT, LV, NO1..NO5, SE1..SE4.
region = "FI"

# Cheapest price "ranks" to heat in.
# Use quotes for ranges (e.g. ["1-10"]) or list individual ranks ([1, 2, 3]).
selected_price_periods = ["1-10"]

# Duration of one rank in minutes.
# One of: 15, 30, 45, 60, 75, 90, 120.
price_period_length = 30

# Night-transfer hours.
# These rarely need changing, even across daylight-saving transitions.
night_hours = [22, 23, 0, 1, 2, 3, 4, 5, 6]

# Difference between night and day prices, in euro cents.
# A negative value means the night transfer is cheaper by this amount.
price_difference = 0

# Search only the night hours for the cheapest periods.
# When true, price_difference is forced to -999 internally.
only_night_hours = false

# Daytime price that is always allowed to heat, in euro cents.
# Set to -99 to disable.
price_always_allowed = -99

# Maximum allowed price, in euro cents.
maximum_price = 20

# Backup hours: heat ON during these hours if spot-hinta is unreachable.
# Use [99] to disable backup heating entirely.
backup_hours = [3, 4, 5, 6]

# Invert the on/off logic (heat when expensive instead of when cheap).
inverted = false

# === Temperature control (degrees Celsius) ===

# Default baseline target, used when none has been persisted yet.
on_temperature = 26

# Setpoint applied when heating is "off".
# Must be below baseline_min so an "off" value is never captured as a baseline.
off_temperature = 15

# Baseline capture window.
# Only a current target within [baseline_min, baseline_max] is saved as the
# device's (manually adjusted) baseline.
baseline_min = 20
baseline_max = 30

# === Heating-mode enforcement ===

# On every write, also send powerOn=true and force a constant-setpoint program,
# so the spot-price target is honoured even if a built-in weekly schedule is
# active. Requires program_name below.
enforce_manual_mode = true

# Program label to force when enforce_manual_mode is true.
# Change to "Home" etc. if your device expects a different constant-setpoint label.
program_name = "Manual"

# === Files, timing, endpoint ===

# Where per-device baselines are persisted.
state_file = "baseline.json"

# Control-loop tick interval (e.g. "15s", "1m").
poll_interval = "15s"

# Ebeco Connect API base URL.
api_base_url = "https://ebecoconnect.com"

# ABP Abp.TenantId header. Ebeco accounts use the default tenant (1).
api_tenant_id = 1
